# Development — full stack with hot reload via volume mounts
# Usage: docker-compose -f docker-compose.dev.yml up --build

services:
  minio:
    image: minio/minio:latest
    container_name: scp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - scp-net

  redis:
    image: redis:7-alpine
    container_name: scp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - scp-net

  storage:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scp-storage
    command: python storage_service.py
    env_file: ./.env
    environment:
      FLASK_DEBUG: "1"
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
    depends_on:
      - minio
      - redis
    restart: unless-stopped
    networks:
      - scp-net

  blockchain:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scp-blockchain
    command: python blockchain_service.py
    env_file: ./.env
    environment:
      FLASK_DEBUG: "1"
    ports:
      - "5002:5002"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - scp-net

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scp-ai
    command: python ai_detection_service.py
    env_file: ./.env
    environment:
      FLASK_DEBUG: "1"
    ports:
      - "5003:5003"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - scp-net

  sandbox:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scp-sandbox
    command: python sandbox_service.py
    env_file: ./.env
    environment:
      FLASK_DEBUG: "1"
    ports:
      - "5004:5004"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - scp-net

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scp-gateway
    command: python main.py
    env_file: ./.env
    environment:
      FLASK_DEBUG: "1"
    ports:
      - "5010:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - storage
      - blockchain
      - ai
      - sandbox
    restart: unless-stopped
    networks:
      - scp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: scp-frontend
    env_file: ./.env
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - scp-net

volumes:
  minio_data:
  redis_data:

networks:
  scp-net:
    driver: bridge
